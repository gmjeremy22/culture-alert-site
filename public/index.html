<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Culture Alert</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #090909;
      color: #f7f4ee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(520px, calc(100% - 40px));
      padding: 28px;
      border: 1px solid rgba(247, 244, 238, 0.18);
      background: #111;
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0; color: #b8b2a8; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>Culture Alert</h1>
    <p>아직 암호화된 리포트가 배포되지 않았습니다. 로컬에서 게시 스크립트를 실행한 뒤 다시 배포하세요.</p>
  </main>
</body>
</html>
