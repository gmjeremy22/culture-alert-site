name: Daily protected report update

on:
  schedule:
    # 07:37 Asia/Seoul. GitHub cron uses UTC.
    - cron: "37 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-protected-report
  cancel-in-progress: false

jobs:
  update-and-deploy:
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      CULTURE_ALERT_SITE_PASSWORD: ${{ secrets.CULTURE_ALERT_SITE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check password secret
        run: |
          if [ -z "$CULTURE_ALERT_SITE_PASSWORD" ]; then
            echo "::error::Add the CULTURE_ALERT_SITE_PASSWORD repository secret before running this workflow."
            exit 1
          fi

      - name: Install Python dependencies
        run: python -m pip install -r automation/requirements.txt

      - name: Restore last successful culture database
        id: culture-db-restore
        uses: actions/cache/restore@v4
        with:
          path: automation/culture-alert/outputs/culture-alert.sqlite
          key: culture-alert-db-${{ github.run_id }}
          restore-keys: |
            culture-alert-db-

      - name: Build encrypted report
        run: python automation/run_daily_update.py

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: culture-alert-audit-reports
          path: |
            automation/culture-alert/outputs/*-audit-report.md
            automation/culture-alert/outputs/*-audit-report.json
          if-no-files-found: warn
          retention-days: 14

      - name: Verify encrypted report
        run: node tools/verify-protected-site.js --html public/index.html --leak "feature-card"

      - name: Save successful culture database
        if: success()
        uses: actions/cache/save@v4
        with:
          path: automation/culture-alert/outputs/culture-alert.sqlite
          key: culture-alert-db-${{ github.run_id }}

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
