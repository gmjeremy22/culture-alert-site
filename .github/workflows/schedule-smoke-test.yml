name: Schedule smoke test

on:
  schedule:
    # Temporary test: avoid common :00/:10/:20 schedule minutes.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scheduled-trigger-check:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger information
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "run_started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
